apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: couple-games
  labels:
    app: couple-games
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: couple-games
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
