apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dragonfly-operator
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: dragonfly-operator
      version: v1.5.0
      sourceRef:
        kind: HelmRepository
        name: dragonfly-operator
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  targetNamespace: dragonfly-operator-system
