# Optional: install Dragonfly Operator via Flux (GitOps).
# Requires metrics-server for some clusters; operator from previous lesson can stay manual.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dragonfly-operator
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/controllers/dragonfly
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
  dependsOn:
    - name: flux-system
